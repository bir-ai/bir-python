name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: python -m pip install -e ".[docs]"

      - name: Build documentation strictly
        run: mkdocs build --strict

  sdk:
    name: Python SDK
    runs-on: ${{ matrix.os }}

    strategy:
      # Report every leg's result instead of cancelling the matrix on the first
      # failure, so an OS- or version-specific regression is never masked. The
      # os x python-version cross-product exercises the cross-platform file lock
      # (POSIX flock on Linux/macOS, the msvcrt byte-range branch on Windows) and
      # the temp-file/rotation paths on every supported interpreter.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK with dev dependencies
        run: python -m pip install -e ".[dev]" pyright

      # PYTHONPATH=src and the inline VAR=value form are POSIX shell syntax, not
      # valid in the Windows runner's default shell, so these steps pin
      # `shell: bash` (present on the Windows and macOS runners too) to run one
      # identical command on every OS.
      - name: Run SDK unit tests
        shell: bash
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run example smoke tests
        shell: bash
        run: PYTHONPATH=src python -m pytest tests/test_examples.py

      # pyright and the release-package check are OS- and interpreter-independent,
      # so we run them once on the canonical ubuntu / 3.12 leg to avoid redundant
      # work; verify_release builds and installs a wheel and need not run per-OS.
      - name: Run pyright
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pyright

      - name: Verify SDK release package
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python scripts/verify_release.py

  fixtures:
    name: Contract fixture drift guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Stdlib-only; no install step. Fails if a shared fixture no longer
      # matches tests/fixtures/CHECKSUMS.sha256. Keep this identical to the
      # bir (product) repo's fixtures job. See tests/fixtures/README.md.
      - name: Verify shared contract fixtures match the committed manifest
        run: python scripts/fixtures.py check
