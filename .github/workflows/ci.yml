name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: python -m pip install -e ".[docs]"

      - name: Build documentation strictly
        run: mkdocs build --strict

  sdk:
    name: Python SDK
    runs-on: ubuntu-latest

    strategy:
      # Report every interpreter's result instead of cancelling the matrix on
      # the first failure, so a version-specific regression is never masked.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK with dev dependencies
        run: python -m pip install -e ".[dev]" pyright

      - name: Run SDK unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run example smoke tests
        run: PYTHONPATH=src python -m pytest tests/test_examples.py

      # pyright and the release-package check are interpreter-independent, so we
      # run them once on a single canonical version to avoid redundant work.
      - name: Run pyright
        if: matrix.python-version == '3.12'
        run: pyright

      - name: Verify SDK release package
        if: matrix.python-version == '3.12'
        run: python scripts/verify_release.py
