name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sdk:
    name: Python SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK with dev dependencies
        run: python -m pip install -e ".[dev]" pyright

      - name: Run SDK unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run example smoke tests
        run: PYTHONPATH=src python -m pytest tests/test_examples.py

      - name: Run pyright
        run: pyright

      - name: Verify SDK release package
        run: python scripts/verify_release.py
