name: Release

# Cut a release by pushing a version tag that matches the pyproject version:
#
#   git tag v0.1.2
#   git push origin v0.1.2
#
# The workflow verifies the package, builds the sdist + wheel, publishes to PyPI
# via Trusted Publishing (OIDC, no stored token), and creates a GitHub Release
# with notes taken from the matching CHANGELOG.md section.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK with dev dependencies
        run: python -m pip install -e ".[dev]" pyright

      - name: Verify SDK release package
        run: python scripts/verify_release.py

  build:
    name: Build distributions
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text('utf-8'))['project']['version'])")"
          echo "tag=$tag pyproject=$version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $version"
            exit 1
          fi

      - name: Build and check sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bir-sdk
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Lets re-runs and already-published versions (e.g. a version uploaded
          # manually) succeed instead of failing the whole release.
          skip-existing: true

  github-release:
    name: GitHub Release
    needs: [build]  # independent of PyPI so the release still lands if publish is skipped
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            index($0, "## " ver " ") == 1 || $0 == "## " ver {found=1; next}
            found && index($0, "## ") == 1 {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $version"
            exit 1
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: bir-sdk ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
