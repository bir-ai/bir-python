site_name: Bir Python SDK
site_description: Local-first LLM tracing and evals for Python
site_url: https://bir-ai.github.io/bir-python/
repo_url: https://github.com/bir-ai/bir-python
repo_name: bir-ai/bir-python
docs_dir: docs/site
site_dir: site

theme:
  name: mkdocs

plugins:
  # ``search`` is MkDocs' implicit default; it must be listed explicitly once a
  # ``plugins:`` block is declared, or the search index would be dropped.
  - search
  # API reference is generated from the package docstrings. Docs tooling only —
  # mkdocstrings lives in the optional ``docs`` extra, never a runtime dependency.
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3

nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - Core API: core-api.md
  - Capture & Privacy: capture-privacy.md
  - Sampling & Service Metadata: sampling-service-metadata.md
  - Sending to a Server: sending.md
  - Integrations: integrations.md
  - Evals & Experiments: evals-experiments.md
  - CLI & Environment Config: cli-env.md
  - API Reference: api-reference.md

markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - fenced_code

strict: true
